<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bayo Oliva | Language Redirect</title>

    <meta
        name="description"
        content="Choose your language for Bayo Oliva private boxing classes."
    >

    <meta name="robots" content="noindex, follow">

    <link rel="alternate" hreflang="en" href="https://www.bayocoach.com/en/">
    <link rel="alternate" hreflang="es" href="https://www.bayocoach.com/es/">
    <link rel="alternate" hreflang="x-default" href="https://www.bayocoach.com/en/">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

    <script>
        const language = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
        const target = language.startsWith('es') ? 'es/' : 'en/';
        window.location.replace(target);
    </script>

    <style>
        :root {
            --primary:#C7F000;
            --black:#030303;
            --white:#ffffff;
            --muted:#bdbdbd;
        }

        * {
            box-sizing:border-box;
        }

        body {
            min-height:100vh;
            margin:0;
            display:grid;
            place-items:center;
            padding:32px;
            background:var(--black);
            color:var(--white);
            font-family:Arial, sans-serif;
            text-align:center;
        }

        h1 {
            margin:0 0 12px;
            font-size:2rem;
            text-transform:uppercase;
        }

        p {
            margin:0 0 24px;
            color:var(--muted);
        }

        a {
            display:inline-flex;
            margin:6px;
            padding:14px 22px;
            background:var(--primary);
            color:#050505;
            font-weight:800;
            text-decoration:none;
            text-transform:uppercase;
        }
    </style>

</head>
<body>

    <main>
        <h1>Bayo Oliva</h1>
        <p>Select your language / Selecciona tu idioma</p>
        <a href="en/">English</a>
        <a href="es/">Español</a>
    </main>

</body>
</html>
